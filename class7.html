<!DOCTYPE html>
<html>
    <head>

        <style>
            b{
                color:rgb(165, 42, 155);

            }
            i{
                color :chocolate;

                font-size: 20px;
                
            }

    <body>

        <i>
            We use CSS for styling a website

        <br> <br> <br> 
        <h2>

        </h2>
        <p id="a">
            Paragraph 1
        </p>

        </p>

            Paragraph 3
        </p>

        <br>

            Paragraph 4
        </p>
        <br> 
        <p class="z">

        </p>

</html>
