<!DOCTYPE html>
<html>

<head>
    <title>
        Html forms
    </title>
</head>

<body>

    <form>
        <fieldset>
            <legend>Personal details</legend>
            <h1>
                Personal Details Form
            </h1>
            <label>
                Name
            </label>
            <br>
            <input type="text" id="name">
            <br> <br>
            <label>
                Mobile number
            </label>
            <br>
            <input type="number" id="Mobile">
            <br> <br>
            <label>
                Date Of Birth
            </label>
            <br>
            <input type="date" id="date">
            <br> <br>
            <label>
                Email id
            </label>
            <br>
            <input type="email" id="email">
            <br> <br>
            <label>
                Gender
            </label>
            <br>
            <input type="radio" id="female" name="gender">
            female
            <br>
            <input type="radio" id="male" name="gender">
            male
            <br> <br>
            <label>
                Hobbies
            </label>
            <br>
            <input type="checkbox" id="hobby">
            swimming
            <br>
            <input type="checkbox" id="hobby">
            soccer
            <br>
            <input type="checkbox" id="hobby">
            basketball
            <br> <br>
            <label>
                Password
            </label>
            <br>
            <input type="password" id="password">
            <br> <br>
            <label>
                Percentage
            </label>
            <br>
            <select>
                <option>
                    select
                </option>
                <option>
                    below 60%
                </option>
                <option>
                    70%
                </option>
                <option>
                    80%
                </option>
                <option>
                    Above 90%
                </option>
            </select>
            <br> <br>
            <input type="submit" id="submit">
        </fieldset>
    </form>

    <br> <br>

    <form>
        <fieldset>
            <legend>
                <b>
                    Enter your marks
                </b>
            </legend>
            
        </fieldset>
    </form>

</body>

</html>
